services:
  db:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: sakrus-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_DB: SakrusDb
    ports:
      - "5439:5432"
    volumes:
      - sakrus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SakrusDb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: .
    container_name: sakrus-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=SakrusDb;Username=postgres;Password=${DB_PASSWORD:-1234}
    ports:
      - "8085:8080"
    volumes:
      - sakrus_dataprotection:/app/dataprotection-keys
      - sakrus_uploads:/app/wwwroot/uploads

volumes:
  sakrus_pgdata:
  sakrus_dataprotection:
  sakrus_uploads: